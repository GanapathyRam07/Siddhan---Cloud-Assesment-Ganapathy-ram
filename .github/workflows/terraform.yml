name: Terraform Infrastructure

on:
  push:
    branches:
      - main
    paths:
      - terraform/**
      - .github/workflows/terraform.yml
  pull_request:
    branches:
      - main
    paths:
      - terraform/**
      - .github/workflows/terraform.yml

env:
  AWS_REGION: ap-south-1
  TF_WORKING_DIR: terraform/

permissions:
  contents: read
  pull-requests: read
  security-events: write

jobs:

  # ─── Job 1: Security Checks ──────────────────────────────────────────────────
  security:
    name: Security Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: GitLeaks secret scan
        run: |
          curl -sSfL https://github.com/zricethezav/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz | tar -xz
          ./gitleaks detect \
            --source . \
            --verbose \
            --redact \
            --no-git \
            --exit-code 1 || echo "GitLeaks scan completed"

      - name: Checkov Terraform security scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/
          framework: terraform
          soft_fail: true
          skip_check: >-
            CKV_TF_1,
            CKV_AWS_2,
            CKV_AWS_91,
            CKV2_AWS_20,
            CKV_AWS_150,
            CKV_AWS_131,
            CKV_AWS_260,
            CKV_AWS_382,
            CKV2_AWS_28,
            CKV_AWS_378,
            CKV_AWS_103,
            CKV2_AWS_11,
            CKV2_AWS_12,
            CKV_AWS_130,
            CKV_AWS_158,
            CKV_AWS_136,
            CKV_AWS_51,
            CKV_AWS_338

  # ─── Job 2: Terraform Plan ───────────────────────────────────────────────────
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: security

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.3

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform Plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -out=tfplan

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: terraform/tfplan

  # ─── Job 3: Terraform Apply ──────────────────────────────────────────────────
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform-plan      # ← plan must succeed before apply runs
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.3

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: terraform/

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve tfplan